<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码保险库 · 纯前端</title>
<link rel="stylesheet" href="vault/vault.css">
</head>
<body>
<header>
  <h1>🔐 密码保险库</h1>
  <p class="tagline">记住一个主密码，管理所有站点密码 · 所有运算在浏览器本地完成，无网络请求</p>
</header>

<!-- ============ 解锁/设置界面 ============ -->
<section id="gate" class="card">
  <div id="gate-setup">
    <h2>设置主密码</h2>
    <p class="hint">首次使用。主密码用于加密所有站点密码 —— 它<b>不会被存储</b>，也无法找回。请务必牢记。</p>
    <label>主密码
      <input type="password" id="setup-pw1" autocomplete="new-password" placeholder="至少 12 个字符">
    </label>
    <label>确认主密码
      <input type="password" id="setup-pw2" autocomplete="new-password">
    </label>
    <div id="setup-meter" class="meter"></div>
    <label class="check"><input type="checkbox" id="setup-show"> 显示输入</label>
    <button id="setup-btn" class="primary">创建保险库</button>
    <div id="setup-status" class="status"></div>
  </div>

  <div id="gate-unlock" hidden>
    <h2>解锁保险库</h2>
    <label>主密码
      <input type="password" id="unlock-pw" autocomplete="current-password" placeholder="输入主密码">
    </label>
    <label class="check"><input type="checkbox" id="unlock-show"> 显示输入</label>
    <button id="unlock-btn" class="primary">解锁</button>
    <div id="unlock-status" class="status"></div>
    <p class="hint small">忘记主密码 = 数据无法恢复。可<a href="#" id="reset-link">重置保险库</a>（将清除所有数据）。</p>
  </div>
</section>

<!-- ============ 主界面 ============ -->
<main id="app" hidden>
  <div class="toolbar">
    <input type="search" id="search" placeholder="搜索站点…" autocomplete="off">
    <button id="add-btn" class="primary">+ 添加</button>
    <button id="lock-btn">锁定</button>
    <button id="menu-btn" title="设置">⚙</button>
  </div>
  <div id="entries" class="entries"></div>
  <div id="empty-hint" class="empty" hidden>暂无条目。点「+ 添加」创建第一个。</div>
</main>

<!-- ============ 添加/编辑条目 ============ -->
<dialog id="entry-dialog">
  <form method="dialog" id="entry-form">
    <h3 id="entry-title">添加条目</h3>
    <label>站点名称
      <input type="text" id="e-name" required placeholder="如 github.com">
    </label>
    <label>用户名 / 邮箱
      <input type="text" id="e-user" placeholder="可选">
    </label>
    <label>密码
      <div class="pw-row">
        <input type="text" id="e-pw" placeholder="手动输入或生成">
        <button type="button" id="e-gen" title="生成">🎲</button>
        <button type="button" id="e-copy" title="复制">⧉</button>
      </div>
    </label>
    <fieldset class="genopts">
      <legend>生成器</legend>
      <label>长度 <input type="number" id="g-len" value="20" min="6" max="64"></label>
      <label class="check"><input type="checkbox" id="g-upper" checked> A-Z</label>
      <label class="check"><input type="checkbox" id="g-lower" checked> a-z</label>
      <label class="check"><input type="checkbox" id="g-digit" checked> 0-9</label>
      <label class="check"><input type="checkbox" id="g-sym" checked> 符号</label>
      <label class="check"><input type="checkbox" id="g-amb"> 剔除易混淆</label>
    </fieldset>
    <div id="e-meter" class="meter"></div>
    <div class="dialog-actions">
      <button type="button" id="e-cancel">取消</button>
      <button type="submit" id="e-save" class="primary">保存</button>
    </div>
  </form>
</dialog>

<!-- ============ 设置菜单 ============ -->
<dialog id="menu-dialog">
  <h3>设置</h3>
  <button id="m-change" class="full">修改主密码</button>
  <button id="m-export" class="full">导出备份（密文）</button>
  <label class="full">导入备份
    <input type="file" id="m-import-file" accept=".json,application/json">
  </label>
  <button id="m-reset" class="full danger">重置保险库（清除全部）</button>
  <hr>
  <p class="hint small">迭代次数 <span id="m-iter"></span> · 数据存储于浏览器 localStorage</p>
  <div class="dialog-actions"><button id="m-close" class="primary">关闭</button></div>
</dialog>

<!-- ============ 修改主密码 ============ -->
<dialog id="change-dialog">
  <form method="dialog" id="change-form">
    <h3>修改主密码</h3>
    <label>当前主密码 <input type="password" id="c-old" autocomplete="current-password"></label>
    <label>新主密码 <input type="password" id="c-new1" autocomplete="new-password"></label>
    <label>确认新主密码 <input type="password" id="c-new2" autocomplete="new-password"></label>
    <div id="c-status" class="status"></div>
    <div class="dialog-actions">
      <button type="button" id="c-cancel">取消</button>
      <button type="submit" class="primary">确认修改</button>
    </div>
  </form>
</dialog>

<footer>
  <p>纯前端实现 · 主密码用 PBKDF2-SHA256(600k) 派生 AES-256-GCM 密钥</p>
  <p class="warn">⚠️ 主密码遗忘 = 数据无法恢复，请务必牢记并定期导出备份。</p>
</footer>

<script src="vault/crypto.js"></script>
<script src="vault/generator.js"></script>
<script src="vault/vault.js"></script>
<script src="vault/ui.js"></script>
</body>
</html>
